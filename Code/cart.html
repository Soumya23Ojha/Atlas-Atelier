```html
<!-- cart.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | Atlas Atelier</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Roboto', sans-serif;
            background:#050505;
        }

        .heading{
            font-family:'Cormorant Garamond', serif;
        }
    </style>
</head>

<body class="text-white">

<section class="max-w-7xl mx-auto px-6 py-20">

    <h1 class="heading text-6xl text-center mb-16">
        Shopping Cart
    </h1>

    <div class="grid lg:grid-cols-3 gap-10">

        <!-- CART ITEMS -->

        <div class="lg:col-span-2 space-y-6">

            {% for item in cart_items %}

            <div class="bg-[#0B0B0B] border border-white/10 p-6">

                <div class="flex flex-col md:flex-row gap-6">

                    <img
                        src="{{ item.product.image.url }}"
                        class="w-40 h-52 object-cover"
                        alt=""
                    >

                    <div class="flex-1">

                        <h2 class="heading text-3xl">
                            {{ item.product.name }}
                        </h2>

                        <p class="text-gray-400 mt-2">
                            Size: {{ item.size }}
                        </p>

                        <p class="text-[#C8A45D] mt-4 text-xl">
                            ₹{{ item.product.price }}
                        </p>

                        <div class="flex items-center gap-4 mt-6">

                            <button class="border border-[#C8A45D] px-3 py-1">
                                -
                            </button>

                            <span>{{ item.quantity }}</span>

                            <button class="border border-[#C8A45D] px-3 py-1">
                                +
                            </button>

                        </div>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

        <!-- ORDER SUMMARY -->

        <div>

            <div class="bg-[#0B0B0B] border border-white/10 p-8 sticky top-10">

                <h2 class="heading text-4xl mb-8">
                    Order Summary
                </h2>

                <div class="space-y-4 text-gray-300">

                    <div class="flex justify-between">
                        <span>Subtotal</span>
                        <span>₹{{ subtotal }}</span>
                    </div>

                    <div class="flex justify-between">
                        <span>Shipping</span>
                        <span>Free</span>
                    </div>

                    <div class="border-t border-white/10 pt-4 flex justify-between text-xl text-white">
                        <span>Total</span>
                        <span>₹{{ total }}</span>
                    </div>

                </div>

                <button
                    class="w-full mt-8 bg-[#C8A45D] text-black py-4 uppercase tracking-[0.25em] font-medium">
                    Proceed To Checkout
                </button>

            </div>

        </div>

    </div>

</section>

</body>
</html>
```
